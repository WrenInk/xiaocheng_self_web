name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent deploys overwriting each other but let new pushes preempt
# stale ones rather than queue them.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Determine basePath
        id: basepath
        # `<owner>.github.io` repos serve at the root, everything else at /<repo>.
        run: |
          REPO_NAME='${{ github.event.repository.name }}'
          OWNER='${{ github.repository_owner }}'
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            echo "value=" >> "$GITHUB_OUTPUT"
          else
            echo "value=/$REPO_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build
        env:
          BASE_PATH: ${{ steps.basepath.outputs.value }}

      - name: Disable Jekyll
        # GH Pages otherwise ignores files/folders starting with _ (like _next).
        run: touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
